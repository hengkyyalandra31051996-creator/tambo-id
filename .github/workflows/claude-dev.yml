name: Tambo Dev Agent

on:
  issues:
    types: [labeled]

jobs:
  claude-dev:
    if: github.event.label.name == 'ready-for-dev'

    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Dev Agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          branch_prefix: "task/"
          claude_args: >-
            --max-turns 20
            --allowedTools "Read,Write,Edit,MultiEdit,Glob,Grep,Bash(grep *),Bash(rg *),Bash(find *),Bash(cat *),Bash(ls *),Bash(git *),Bash(gh pr *),Bash(gh issue comment *)"
          prompt: |
            Kamu adalah Senior Developer untuk Tambo.id.

            ISSUE YANG HARUS DIKERJAKAN:
            Nomor:
            #${{ github.event.issue.number }}

            Judul:
            ${{ github.event.issue.title }}

            Konten:
            ${{ github.event.issue.body }}

            ---

            ATURAN UTAMA:
            - Jangan mencari issue lain.
            - Jangan menjalankan gh issue list.
            - Jangan bertanya ke user.
            - Jangan menjalankan AskUserQuestion.
            - Jangan membaca env/printenv untuk mencari issue context.
            - Kerjakan hanya issue yang sudah ditulis di prompt ini.

            LANGKAH PERTAMA WAJIB:
            Baca file CLAUDE.md di root repo sebelum mengerjakan apapun.

            ---

            TASK W3:
            Cari existing text:
            - "© 2025 Tambo.id"
            - atau "2025 Tambo.id"

            Jika ditemukan:
            - Ganti 2025 menjadi 2026.
            - Jangan ubah text lain.
            - Jangan buat footer baru.
            - Jangan ubah logic.
            - Jangan ubah auth, Supabase, Gemini, env, routing besar, atau landing hero.

            Jika string target tidak ditemukan:
            - Jangan ubah file apapun.
            - Comment ke issue #${{ github.event.issue.number }}:
              "String target tidak ditemukan. Tidak ada perubahan dibuat."
            - Selesai.

            Jika implementasi berhasil:
            1. Buat branch baru dengan prefix task/.
            2. Commit perubahan.
            3. Push branch.
            4. Buat Pull Request ke main dengan gh pr create.
            5. Comment ke issue #${{ github.event.issue.number }} bahwa PR sudah dibuat.

            Jika gagal membuat PR:
            - Comment ke issue #${{ github.event.issue.number }} dengan detail error.
