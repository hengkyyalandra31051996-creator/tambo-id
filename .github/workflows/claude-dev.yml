# ============================================================
# Tambo Dev Agent — Claude Code GitHub Actions v2
# Trigger : GitHub Issue diberi label "ready-for-dev"
# Action  : Claude Code membaca issue, implementasi, buat PR
# ============================================================

name: Tambo Dev Agent

on:
  issues:
    types: [labeled]

jobs:
  claude-dev:
    if: github.event.label.name == 'ready-for-dev'

    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Dev Agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          claude_args: >-
            --max-turns 30
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash(grep *),Bash(rg *),Bash(find *),Bash(cat *),Bash(ls *),Bash(git *),Bash(gh pr *),Bash(gh issue comment *)"
          settings: |
            {
              "permissions": {
                "allow": [
                  "Read",
                  "Write",
                  "Edit",
                  "Glob",
                  "Grep",
                  "Bash(grep *)",
                  "Bash(rg *)",
                  "Bash(find *)",
                  "Bash(cat *)",
                  "Bash(ls *)",
                  "Bash(git *)",
                  "Bash(gh pr *)",
                  "Bash(gh issue comment *)"
                ]
              }
            }
          prompt: |
            Kamu adalah Senior Developer untuk Tambo.id.

            LANGKAH PERTAMA WAJIB:
            Baca file CLAUDE.md di root repo ini.

            Setelah membaca CLAUDE.md, baca isi issue ini secara lengkap:
            - title
            - body
            - semua subtask
            - acceptance criteria
            - guardrails
            - implementation notes

            Lakukan implementasi sesuai issue.

            ATURAN WAJIB — JANGAN SILENT FAIL:

            1. Jika string target tidak ditemukan di codebase:
               - Jangan membuat perubahan apapun.
               - Wajib comment di issue ini:
                 "String target tidak ditemukan. Tidak ada perubahan dibuat."
               - Gunakan gh issue comment.

            2. Jika tidak ada perubahan yang dibuat:
               - Wajib comment di issue ini dan jelaskan alasannya.

            3. Jika implementasi berhasil:
               - Buat branch baru: task/[task-id-lowercase]
               - Commit perubahan ke branch tersebut
               - Push branch
               - Buat Pull Request ke main dengan gh pr create

            4. PR body wajib berisi:
               - File yang diubah + deskripsi perubahan
               - Checklist acceptance criteria
               - Cara test
               - Known issues jika ada

            5. Jika gagal membuat PR:
               - Wajib comment di issue ini dengan detail error.
